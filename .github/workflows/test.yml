name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pyyaml
      - name: tests
        run: python -m pytest tests/ -v

  # The former wire-with-mindframe job ran cross-repo frame-spawn tests
  # against mindframe's spawn CLI. Both sides of that contract were removed
  # (mindframe deleted lib/spawn.py; dispatcher dropped the frame: recipe
  # path), so the job is gone with them.
